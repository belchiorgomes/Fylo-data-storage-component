<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style/style.css">
  
  <title>Frontend Mentor | Fylo data storage component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main id="container">
    <section id="container-logo">
      <figure>
        <img src="images/logo.svg" alt="Logo">
      </figure>

      <div class="container-logo-file">
        <a href="#"><img src="images/icon-document.svg" alt="Document icon"></a>
        <a href="#"><img src="images/icon-folder.svg" alt="Folder icon"></a>
        <a href="#"><img src="images/icon-upload.svg" alt="Upload icon"></a>
      </div>
    </section>
    
    <section id="container-date">
      <p>You’ve used <span>815 GB</span> of your storage</p>

      <div class="container-barra"></div>

      <p class="dados"><span>0 gb</span><span>1000 gb</span></p>

      <div class="balloon">
        <span>185</span>
        <span>gb left</span>
      </div>
    </section>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
